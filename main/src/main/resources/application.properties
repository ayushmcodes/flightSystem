spring.application.name=flight-booking
server.port=8080

# Datasource. Defaults target a local Postgres; docker-compose overrides the URL/creds
# via SPRING_DATASOURCE_* env vars so the app connects to the `postgres` service.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flightdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flight}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:flight}

# Schema + seed are owned entirely by db/init/*.sql (Postgres initdb). Hibernate never DDLs.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Hold TTL (ISO-8601 duration) and sweeper cadence.
flight.hold.ttl=PT10M
flight.hold.sweep-interval-ms=60000
